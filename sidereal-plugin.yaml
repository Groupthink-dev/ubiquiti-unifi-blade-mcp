name: ubiquiti-unifi-blade-mcp
display_name: Ubiquiti UniFi
description: >
  Network monitoring and security for Ubiquiti UniFi controllers.
  Device health, client visibility, firewall policies, traffic routes,
  DPI restrictions, and port forwards with token-efficient output.
author: groupthink-dev
version: 0.1.0
license: MIT
homepage: https://github.com/groupthink-dev/ubiquiti-unifi-blade-mcp
repository: https://github.com/groupthink-dev/ubiquiti-unifi-blade-mcp
tier: certified
author_type: first-party
readiness: stub

contract: network-v1
multi_instance: true

runtime:
  command: uv
  args:
    - --directory
    - "{{install_path}}"
    - run
    - ubiquiti-unifi-blade-mcp
  transport: stdio

auth:
  model: credentials
  fields:
    - key: UNIFI_HOST
      label: Controller Host
      type: string
      required: true
      placeholder: "192.168.1.1"
      help: IP address or hostname of the UniFi controller
    - key: UNIFI_USERNAME
      label: Username
      type: string
      required: true
      placeholder: admin
    - key: UNIFI_PASSWORD
      label: Password
      type: password
      required: true
    - key: UNIFI_PORT
      label: Port
      type: number
      required: false
      default: "443"
      help: Controller port (443 for UniFi OS, 8443 for classic)
    - key: UNIFI_SITE
      label: Site
      type: string
      required: false
      default: default
      help: UniFi site name
    - key: UNIFI_VERIFY_SSL
      label: Verify SSL
      type: boolean
      required: false
      default: "false"
      help: Verify SSL certificates (disable for self-signed)
    - key: UNIFI_TOTP_SECRET
      label: TOTP Secret
      type: password
      required: false
      help: Base32-encoded TOTP secret for 2FA
    - key: UNIFI_WRITE_ENABLED
      label: Enable Write Operations
      type: boolean
      required: false
      default: "false"
      help: Enable client blocking, WLAN toggle, device restart

  multi_instance:
    label: Controllers
    key_prefix: UNIFI
    list_env: UNIFI_CONTROLLERS
    per_instance_fields:
      - key: HOST
        label: Controller Host
        type: string
        required: true
      - key: USERNAME
        label: Username
        type: string
        required: true
      - key: PASSWORD
        label: Password
        type: password
        required: true
      - key: PORT
        label: Port
        type: number
        required: false
        default: "443"
      - key: SITE
        label: Site
        type: string
        required: false
        default: default

test:
  command: uv
  args:
    - --directory
    - "{{install_path}}"
    - run
    - pytest
    - tests/
    - -m
    - not e2e
    - -v
  env:
    UNIFI_HOST: "192.168.1.1"
    UNIFI_USERNAME: admin
    UNIFI_PASSWORD: test-password

help:
  setup: |
    1. Ensure your UniFi controller is accessible on the network
    2. Create a local admin account (or use an existing one)
    3. For 2FA-enabled accounts, provide the TOTP secret (base32)
    4. Set Verify SSL to false for self-signed certificates (common on UDM)
    5. Write operations are disabled by default — enable only if needed
  troubleshooting: |
    - "Login failed": Check credentials and that the controller is reachable
    - "Connection refused": Verify host/port — UDM uses 443, classic uses 8443
    - SSL errors: Set Verify SSL to false for self-signed certificates
    - 2FA required: Provide the TOTP secret (Settings > Admins > 2FA setup)
    - "Unknown controller": Check controller name matches UNIFI_CONTROLLERS list
